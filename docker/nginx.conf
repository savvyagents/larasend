# Larasend is only ever terminated in plain HTTP by this container. Forward
# whatever scheme a real upstream reverse proxy reports via X-Forwarded-Proto
# so Laravel's TrustProxies middleware can tell HTTP and HTTPS apart, and
# fall back to nginx's own scheme when no proxy sits in front.
map $http_x_forwarded_proto $larasend_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_PROTO $larasend_forwarded_proto;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
